name: Sync Peachify Key
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install undici
      - run: node -e "
          const { fetch } = require('undici');
          (async () => {
            const html = await (await fetch('https://peachify.top/embed/movie/1007757', {
              headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/137.0.0.0 Safari/537.36' }
            })).text();
            const scripts = [...html.matchAll(/<script[^>]*src=\"(\/_next\/static\/chunks\/[a-zA-Z0-9_-]+\.js)\"[^>]*>/g)];
            const js = await (await fetch('https://peachify.top' + scripts[6][1])).text();
            const key = js.match(/\"([a-f0-9]{64})\"/i)?.[1];
            if (!key) throw new Error('Key not found');
            require('fs').writeFileSync('89221.txt', key);
          })();
        "
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '. - auto'
          file_pattern: '89221.txt'
